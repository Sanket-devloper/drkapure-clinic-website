<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f9fafb;
      --surface: #ffffff;
      --text: #2d3442;
      --muted: #5a6578;
      --accent: #c07878;
      --accent-soft: #dba8a0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, rgba(219, 168, 160, 0.25), transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(192, 120, 120, 0.18), transparent 40%),
        var(--bg);
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--surface);
      border: 1px solid rgba(192, 120, 120, 0.25);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(45, 52, 66, 0.08);
    }

    .code {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 12px 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(45, 52, 66, 0.14);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    }

    .btn-secondary {
      color: var(--text);
      border: 1px solid rgba(192, 120, 120, 0.45);
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="error-title">
    <p class="code">Error 404</p>
    <h1 id="error-title">Page not found</h1>
    <p>The page you requested is not available. It may have been moved, renamed, or removed.</p>

    <div class="actions">
      <a class="btn btn-primary" href="/">Go to Home</a>
      <a class="btn btn-secondary" href="/contact">Contact Clinic</a>
    </div>
  </main>
</body>
</html>
